spring.application.name=chat-app-backend
spring.data.mongodb.uri=${MONGODB_URI:mongodb+srv://<username>:<password>@cluster.mongodb.net/<dbname>}
server.port=${PORT:8080}
frontend.url=${FRONTEND_URL:http://localhost:5173,https://your-production-domain.com}

# MongoDB connection pool & timeout settings for production
spring.data.mongodb.auto-index-creation=true

# Actuator health endpoint (for Render health checks)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Logging for debugging production issues
logging.level.org.springframework.data.mongodb=INFO
logging.level.org.springframework.web.socket=INFO